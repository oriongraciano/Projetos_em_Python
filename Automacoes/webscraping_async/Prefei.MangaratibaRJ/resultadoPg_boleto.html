    <script language="javascript" type="text/javascript">
        function TrocarCodigoBarra() {
            var tipo = '99';
            var visivel = 'invisivel';
            var pnTodos = document.getElementById('pnCopiarCodigoBarras');
            var pnFebraban = document.getElementById('pnCopiarCodigoBarrasFebraban');
            var pnBanco = document.getElementById('pnCopiarCodigoBarrasBanco');
            var pnUnico = document.getElementById('pnCopiarCodigoBarrasUnico');

            if (tipo == '1') {
                //Febraban
                if (pnUnico.className == 'visivel') {
                    pnFebraban.className = visivel;
                    pnUnico.className = 'invisivel';
                }
                else {
                    pnFebraban.className = 'invisivel';
                    pnUnico.className = visivel;
                }
                pnBanco.className = 'invisivel';
                pnTodos.className = visivel;
            }
            else if (tipo == '11' || tipo == '10' || tipo == '0') {
                pnTodos.className = 'invisivel';
            }
            else {
                //Banco
                if (pnUnico.className == 'visivel') {
                    pnBanco.className = visivel;
                    pnUnico.className = 'invisivel';
                }
                else {
                    pnBanco.className = 'invisivel';
                    pnUnico.className = visivel;
                }
                pnFebraban.className = 'invisivel';
                pnTodos.className = visivel;
            }
        }

        function Imprimir() {
            window.open('guia.aspx?Tributo=11&Divida=0&Guia=1607804&Parcelas=2&Inscricao=10365299&SegundaVia=False&Totem=False&imprimir=1&logemissao=0', '_blank');
        }

	    
            function BodyOnLoad(imprimir) 
            {
                if (imprimir != 0) {
                    document.getElementById('pnCopiarCodigoBarras').style.display = 'none';
                }
                AuxBodyOnLoad(imprimir);
                
            };
        	
    </script>
